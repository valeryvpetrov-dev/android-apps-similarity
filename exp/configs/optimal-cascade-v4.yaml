# optimal-cascade-v4.yaml
# Extends v3 with SOTA-001 code_layer v2 (opcode n-gram TLSH).
# code_layer.mode controls which code comparison strategy is used:
#   v1_jaccard — DEX filename Jaccard (default, legacy)
#   v2_tlsh    — opcode n-gram TLSH fuzzy hash (SOTA-001)
#   ged        — graph edit distance (requires soot / decoded APK)

code_layer:
  mode: v2_tlsh       # v1_jaccard | v2_tlsh | ged
  window: 5           # n-gram window size for v2_tlsh
  norm_divisor: 300   # TLSH distance normalization divisor (300 ≈ 50% structural overlap)

# NOISE-GATE-WIRING (wave 16, P0 от критика noise-cleanup волны 14):
# первый фильтр каскада — отсечение шумных APK до индексации
# по envelope-triggers из слоя очистки шума.
noise_gate:
  enabled: true
  reject_triggers: [adware, fake]

stages:
  screening:
    features: [code, metadata]
    metric: jaccard
    threshold: 0.70  # THRESH-002 calibrated by SCREENING-27 on F-Droid v2 train/test
  pairwise:
    features: [code, component, resource, library, metadata]
