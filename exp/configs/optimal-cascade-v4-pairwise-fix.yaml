# optimal-cascade-v4-pairwise-fix.yaml
# Fix for DEEP-002: adds metric and threshold to pairwise stage.
# Without these fields pairwise_runner.parse_pairwise_stage raises ValueError.

code_layer:
  mode: v2_tlsh       # v1_jaccard | v2_tlsh | ged
  window: 5           # n-gram window size for v2_tlsh
  norm_divisor: 300   # TLSH distance normalization divisor (300 ≈ 50% structural overlap)

stages:
  screening:
    features: [code, metadata]
    metric: jaccard
    # preliminary t=0.28, калибровка отложена до EXEC-080 (train/test split)
    threshold: 0.28
  deepening:
    # добавлено в волне 12 (ARCH-12-CASCADE-DEEPENING)
    # Обязательный блок для deepening_runner.run_deepening: без него
    # раннер падает с ValueError("Config field stages.deepening must be an object.").
    # Минимальный контракт зафиксирован в phd: system/cascade-config-schema-v1.md, раздел 3d.
    # Реальный набор слоёв раннер вычисляет из stages.pairwise.features
    # за вычетом уже посчитанного в screening, поэтому здесь пустые списки
    # соответствуют встроенному fallback collect_stage_features.
    features: []
    views: []
  pairwise:
    features: [code, component, resource, library, metadata]
    metric: jaccard
    threshold: 0.03
